<script>

window.onload=function(){

const agora=new Date();

document.getElementById("data").value=
agora.toLocaleDateString('pt-BR');

document.getElementById("hora").value=
agora.toLocaleTimeString('pt-BR',{
hour:'2-digit',
minute:'2-digit'
});

}

function teste(){

alert("Interface funcionando! 🚍");

}

</script>
