<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>CheckFrota GB</title>

    <!-- Bootstrap -->

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Fonte -->

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- CSS -->

    <link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container-app">

    <!-- CABEÇALHO -->

    <header class="app-header">

        <img
            src="assets/logo.png"
            alt="Grupo Brasileiro"
            class="logo">

        <h1>

            CheckFrota GB

        </h1>

        <p>

            Relatório de Inspeção Pré-Operacional

        </p>

    </header>


    <!-- BARRA -->

    <div class="progress sticky-top mb-4">

        <div
            id="progressBar"
            class="progress-bar">

        </div>

    </div>


    <!-- IDENTIFICAÇÃO -->

    <section class="card shadow-sm mb-4">

        <div class="card-body">

            <h3>

                🚍 Identificação

            </h3>

            <div class="mb-3">

                <label class="form-label">

                    Motorista

                </label>

                <input
                    id="motorista"
                    type="text"
                    class="form-control">

            </div>

            <div class="mb-3">

                <label class="form-label">

                    Ordem de Serviço

                </label>

                <input
                    id="os"
                    type="text"
                    class="form-control">

            </div>

            <div class="row">

                <div class="col">

                    <label class="form-label">

                        Placa

                    </label>

                    <input
                        id="placa"
                        class="form-control">

                </div>

                <div class="col">

                    <label class="form-label">

                        Prefixo

                    </label>

                    <input
                        id="prefixo"
                        class="form-control">

                </div>

            </div>

            <div class="mt-3">

                <label class="form-label">

                    Destino

                </label>

                <input
                    id="destino"
                    class="form-control">

            </div>

            <div class="row mt-3">

                <div class="col">

                    <label class="form-label">

                        Data

                    </label>

                    <input
                        id="data"
                        class="form-control"
                        readonly>

                </div>

                <div class="col">

                    <label class="form-label">

                        Hora

                    </label>

                    <input
                        id="hora"
                        class="form-control"
                        readonly>

                </div>

            </div>

        </div>

    </section>

    <!-- DOCUMENTAÇÃO -->

    <section class="card shadow-sm mb-4">

        <div class="card-body">

            <h3>

                📄 Documentação

            </h3>

            <div id="documentacao">

            </div>

        </div>

    </section>

    <!-- MECÂNICA -->

    <section class="card shadow-sm mb-4">

        <div class="card-body">

            <h3>

                🔧 Mecânica

            </h3>

            <div id="mecanica">

            </div>

        </div>

    </section>

    <!-- SEGURANÇA -->

    <section class="card shadow-sm mb-4">

        <div class="card-body">

            <h3>

                🛡 Segurança

            </h3>

            <div id="seguranca">

            </div>

        </div>

    </section>

    <!-- LIMPEZA -->

    <section class="card shadow-sm mb-4">

        <div class="card-body">

            <h3>

                🧹 Limpeza

            </h3>

            <div id="limpeza">

            </div>

        </div>

    </section>

    <!-- CONFORTO -->

    <section class="card shadow-sm mb-4">

        <div class="card-body">

            <h3>

                💧 Conforto

            </h3>

            <div id="conforto">

            </div>

        </div>

    </section>

    <!-- FOTOS -->

    <section class="card shadow-sm mb-4">

        <div class="card-body">

            <h3>

                📷 Fotos da Inspeção

            </h3>

            <div id="fotos">

            </div>

        </div>

    </section>

    <!-- OBSERVAÇÕES -->

    <section class="card shadow-sm mb-4">

        <div class="card-body">

            <h3>

                📝 Observações

            </h3>

            <textarea
                id="observacoes"
                rows="5"
                class="form-control">

            </textarea>

        </div>

    </section>

    <!-- BOTÃO -->

    <button
        id="btnGerar"
        class="btn btn-primary btn-lg w-100">

        Gerar Relatório

    </button>

    <br><br><br>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

<script src="script.js"></script>

</body>

</html>
