<!DOCTYPE html>
<html lang="pt-br">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>CheckFrota GB</title>

    <link rel="stylesheet" href="style.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

</head>

<body>

<div class="container">

    <!-- =====================================
         CABEÇALHO
    ====================================== -->

    <header class="app-header">

    <img src="Assets/logo.png" class="logo" alt="Logo">

    <h1>CheckFrota GB</h1>
    <p>Relatório de Inspeção Pré-Operacional</p>

  </header>


    <!-- =====================================
         DADOS DO MOTORISTA / VEÍCULO
    ====================================== -->

    <div class="card">

        <div class="card-title">Dados da Inspeção</div>

        <input type="text" id="txtmotorista" placeholder="Motorista">

        <input type="text" id="txtplaca" placeholder="Placa">

        <input type="text" id="txtprefixo" placeholder="Prefixo">

        <input type="text" id="txtdestino" placeholder="Destino">

        <input type="date" id="data">

        <input type="time" id="hora">

    </div>


    <!-- =====================================
         CHECKLIST
    ====================================== -->

    <div class="card">

        <div class="card-title">Checklist</div>

        <div id="Documentação"></div>
        <div id="Mecânica"></div>
        <div id="Segurança"></div>
        <div id="Limpeza"></div>
        <div id="Serviço de Bordo"></div>

        <!-- progresso -->
        <div class="progress-box">

            <div class="progress-bar-container">
                <div id="progressBar" class="progress-bar"></div>
            </div>

            <div class="progress-text">
                <span id="percentual">0%</span>
                <span id="contadorItens">0 de 0 itens</span>
            </div>

        </div>

    </div>



    <!-- =====================================
         FOTOS
    ====================================== -->

    <div class="card">

        <div class="card-title">Fotos da Inspeção</div>

        <div id="photoContainer"></div>

    </div>

    <!-- =====================================
     LOADING
    ====================================== -->

    <div id="loading" class="loading">

        <div class="loading-box">

        <div class="spinner"></div>

        <h2>Gerando relatório...</h2>

        <p>Aguarde alguns instantes.</p>

    </div>

</div>


    <!-- =====================================
         BOTÃO FINALIZAR
    ====================================== -->

    <button id="btnFinalizar">
        Finalizar Inspeção
    </button>

</div>

<!-- =====================================
     MODAL DA CÂMERA
====================================== -->

<div id="cameraModal" class="camera-modal">

    <div class="camera-container">

        <div class="camera-header">

            <h3>Capturar Foto</h3>

            <button
                id="btnFecharCamera"
                class="camera-close"
                onclick="fecharCamera()">

                ✕

            </button>

        </div>

        <div class="camera-preview">

            <video
                id="cameraVideo"
                autoplay
                playsinline>

            </video>
        
        </div>

        <div class="camera-footer">

            <button
                id="btnCapturar"
                class="camera-shot"
                onclick="capturarFoto()">

                📷 Capturar

            </button>

        </div>

    </div>

</div>


<!-- =========================================
     SCRIPTS
========================================= -->

<script src="checklist.js"></script>
<script src="photos.js"></script>
<script src="camera.js"></script>
<script src="api.js"></script>
<script src="script.js"></script>

</body>
</html>
