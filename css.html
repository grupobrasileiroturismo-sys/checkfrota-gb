<style>

/* =========================================
   RESET BASE
========================================= */

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

html, body {
    width: 100%;
    min-height: 100%;
    font-family: 'Poppins', sans-serif;
    background: #F4F6F9;
    color: #1c1c1c;
}

/* container principal */
.container {
    width: 100%;
    max-width: 900px;
    margin: 0 auto;
    padding: 12px;
}


/* =========================================
   HEADER
========================================= */

header {
    text-align: center;
    padding: 18px 10px;
}

header h1 {
    font-size: 20px;
    font-weight: 700;
}

header p {
    font-size: 13px;
    color: #666;
}


/* =========================================
   CARD GERAL
========================================= */

.card {
    background: #fff;
    border-radius: 12px;
    padding: 14px;
    margin-bottom: 14px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.06);
}

.card-title {
    font-size: 15px;
    font-weight: 600;
    margin-bottom: 10px;
}


/* =========================================
   INPUTS
========================================= */

input,
textarea,
select {
    width: 100%;
    padding: 10px;
    border-radius: 8px;
    border: 1px solid #ddd;
    font-size: 14px;
    outline: none;
    margin-top: 6px;
}

textarea {
    min-height: 90px;
    resize: none;
}


/* =========================================
   CHECKLIST - CATEGORIAS (CARDS)
========================================= */

.category-card {
    background: #fff;
    border-radius: 12px;
    padding: 12px;
    margin-bottom: 14px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.06);
}

.category-title {
    font-size: 13px;
    font-weight: 700;
    margin-bottom: 10px;
    color: #1a1a1a;
    border-left: 4px solid #1976D2;
    padding-left: 8px;
}


/* =========================================
   ITENS DO CHECKLIST
========================================= */

.check-item {
    padding: 12px 0;
    border-bottom: 1px solid #eee;
}

.item-title {
    font-weight: 600;
    font-size: 14px;
    margin-bottom: 8px;
}


/* status buttons */
.status {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
}

.status button {
    flex: 1;
    min-width: 95px;
    padding: 9px;
    border: none;
    border-radius: 8px;
    font-size: 12px;
    cursor: pointer;
    background: #f1f1f1;
    transition: 0.2s;
}

.status button.active {
    transform: scale(1.03);
    font-weight: 600;
}

/* estados visuais */
.success.active {
    background: #DFF7E2;
    color: #167A2F;
}

.danger.active {
    background: #FFE1E1;
    color: #B00020;
}

.na.active {
    background: #EAEAEA;
    color: #555;
}


/* =========================================
   PROGRESSO
========================================= */

.progress-box {
    margin-top: 10px;
}

.progress-bar-container {
    width: 100%;
    height: 10px;
    background: #E6E6E6;
    border-radius: 20px;
    overflow: hidden;
}

.progress-bar {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, #4CAF50, #1B5E20);
    transition: width 0.3s ease;
}

.progress-text {
    font-size: 12px;
    color: #555;
    margin-top: 5px;
}


/* =========================================
   FOTOS
========================================= */

.photo-item {
    margin-bottom: 16px;
}

.photo-title {
    font-size: 14px;
    font-weight: 600;
    margin-bottom: 8px;
}

/* caixa da foto */
.photo-card {
    border: 2px dashed #D0D7DE;
    border-radius: 12px;
    min-height: 170px;
    background: #FAFAFA;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    overflow: hidden;
}

/* apenas "Foto" */
.photo-placeholder {
    font-size: 14px;
    color: #777;
}

/* imagem */
.photo-preview {
    width: 100%;
    height: auto;
    object-fit: cover;
    display: block;
}


/* =========================================
   BOTÕES FOTOS
========================================= */

.photo-actions {
    display: flex;
    gap: 8px;
    margin-top: 8px;
}

.photo-actions button {
    flex: 1;
    padding: 10px;
    border: none;
    border-radius: 8px;
    font-size: 12px;
    cursor: pointer;
}

.photo-actions button:nth-child(1) {
    background: #E3F2FD;
}

.photo-actions button:nth-child(2) {
    background: #EDE7F6;
}

.photo-actions button:nth-child(3) {
    background: #FFEBEE;
}


/* =========================================
   BOTÃO FINALIZAR
========================================= */

#btnFinalizar {
    width: 100%;
    padding: 14px;
    margin-top: 18px;
    border: none;
    border-radius: 10px;
    background: #1976D2;
    color: #fff;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
}

#btnFinalizar:active {
    transform: scale(0.98);
}


/* =========================================
   RESPONSIVO
========================================= */

@media (min-width: 768px) {

    .container {
        padding: 20px;
    }

    header h1 {
        font-size: 24px;
    }

    .status button {
        font-size: 13px;
    }
}

</style>
