<style>

/* =========================================
   RESET BASE
========================================= */

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

html, body {
    width: 100%;
    min-height: 100%;
    font-family: 'Poppins', sans-serif;
    background: #F4F6F9;
    color: #1c1c1c;
}

/* container principal */
.container {
    width: 100%;
    max-width: 900px;
    margin: 0 auto;
    padding: 12px;
}


/* =========================================
   HEADER
========================================= */

header{

    background:var(--primary);

    color:white;

    padding:22px;

    text-align:center;

    border-bottom:5px solid var(--gold);

}

header h1{

    color:white;

    font-size:26px;

    font-weight:700;

}

header p{

    color:#E8F2F4;

    margin-top:6px;

}

/* =========================================
   CARD GERAL
========================================= */

.card{

    background:white;

    border-radius:12px;

    border:1px solid var(--border);

    box-shadow:var(--shadow);

    margin-bottom:18px;

    overflow:hidden;

}


/* =========================================
   INPUTS
========================================= */

input,
textarea,
select {
    width: 100%;
    padding: 10px;
    border-radius: 8px;
    border: 1px solid var(--border);
    font-size: 14px;
    outline: none;
    margin-top: 6px;
}

input:focus,
textarea:focus{
    border-color: var(--secondary);
    box-shadow:0 0 0 3px rgba(24,183,199,.15);
}

textarea {
    min-height: 90px;
    resize: none;
}


/* =========================================
   CHECKLIST - CATEGORIAS (CARDS)
========================================= */

.category-card{

    border:1px solid var(--border);

    border-left:6px solid var(--primary);

    border-radius:12px;

    margin-bottom:20px;

    overflow:hidden;

    box-shadow:var(--shadow);

}

.category-title{

    background:#F8FAFB;

    padding:14px 18px;

    color:var(--primary);

    font-size:18px;

    font-weight:700;

    letter-spacing:.5px;

}


/* =========================================
   ITENS DO CHECKLIST
========================================= */

.check-item {
    padding: 12px 0;
    border-bottom: 1px solid #eee;
}

.item-title {
    font-weight: 600;
    font-size: 12px;
    margin-bottom: 8px;
}


/* status buttons */
.status {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
}

.status button {
    flex: 1;
    min-width: 95px;
    padding: 9px;
    border: none;
    border-radius: 8px;
    font-size: 12px;
    cursor: pointer;
    background: #f1f1f1;
    transition: 0.2s;
}

.status button.active {
    font-weight: 600;
}

/* estados visuais */
.success.active {
    background: #DFF7E2;
    color: #167A2F;
}

.danger.active {
    background: #FFE1E1;
    color: #B00020;
}

.na.active {
    background: #EAEAEA;
    color: #555;
}


/* =========================================
   PROGRESSO
========================================= */

.progress-box {
    margin-top: 10px;
}

.progress-bar-container {
    width: 100%;
    height: 10px;
    background: #E6E6E6;
    border-radius: 20px;
    overflow: hidden;
}

.progress-bar {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, var(--secondary), var(--primary));
    transition: width 0.3s ease;
}

.progress-text {
    font-size: 12px;
    color: #555;
    margin-top: 5px;
}


/* =========================================
   FOTOS
========================================= */

.photo-item {
    margin-bottom: 16px;
}

.photo-title {
    font-size: 14px;
    font-weight: 600;
    margin-bottom: 8px;
}

/* caixa da foto */
.photo-card{

    min-height:90px;

    display:flex;

    justify-content:center;

    align-items:center;

    border:2px dashed var(--secondary);

    border-radius:12px;

    background:#fff;

    padding:15px;

}

/* apenas texto "Foto" */
.photo-placeholder {
    text-align: center;
    font-size: 14px;
    color: #777;
}

.photo-icon{

    font-size:30px;

    color:var(--primary);

    margin-bottom:10px;

}

/* preview */
.photo-info{

    font-size:14px;

    color:#555;

    word-break:break-word;

}


/* =========================================
   BOTÕES FOTOS
========================================= */

.photo-actions {
    display: flex;
    gap: 8px;
    margin-top: 8px;
}

.photo-actions button {
    flex: 1;
    padding: 10px;
    border: none;
    border-radius: 8px;
    font-size: 12px;
    cursor: pointer;
}

.photo-actions button:nth-child(1) {
    background: #E3F2FD;
}

.photo-actions button:nth-child(2) {
    background: #EDE7F6;
}

.photo-actions button:nth-child(3) {
    background: #FFEBEE;
}


/* =========================================
   BOTÃO FINALIZAR
========================================= */

#btnFinalizar {
    width: 100%;
    padding: 14px;
    margin-top: 18px;
    border: none;
    border-radius: 10px;
    background: #1976D2;
    color: #fff;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
}

#btnFinalizar:active {
    transform: scale(0.98);
}
#btnFinalizar{

    background:var(--primary);

}

#btnFinalizar:hover{

    background:var(--primary-dark);

}


/* =========================================
   RESPONSIVO
========================================= */

@media (min-width: 768px) {

    .container {
        padding: 20px;
    }

    header h1 {
        font-size: 24px;
    }

    .status button {
        font-size: 13px;
    }
}

</style>
