<script>

function toggleCard(id) {
  var el = document.getElementById(id);
  if (el.style.display === "block") {
    el.style.display = "none";
  } else {
    el.style.display = "block";
  }
}

// PROGRESS SIMPLES (BASE)
function atualizarProgresso() {
  let inputs = document.querySelectorAll("select, input, textarea");
  let total = inputs.length;
  let preenchidos = 0;

  inputs.forEach(i => {
    if (i.value && i.value !== "") {
      preenchidos++;
    }
  });

  let percent = Math.round((preenchidos / total) * 100);

  document.getElementById("progressBar").style.width = percent + "%";
}

// EVENTOS
document.querySelectorAll("select, input, textarea").forEach(el => {
  el.addEventListener("change", atualizarProgresso);
  el.addEventListener("keyup", atualizarProgresso);
});

function gerarRelatorio() {
  alert("Módulo 3 (PDF) será implementado em seguida 🚀");
}

function preencherDataHora() {
  const agora = new Date();

  const data = agora.toISOString().split('T')[0];
  const hora = agora.toTimeString().split(':')[0] + ":" + agora.toTimeString().split(':')[1];

  document.getElementById("data").value = data;
  document.getElementById("hora").value = hora;
}

window.onload = function () {
  preencherDataHora();
};

</script>
